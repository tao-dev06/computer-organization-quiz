<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算机组成原理 · 题库训练舱</title>
<style>
:root {
  color-scheme: dark;
  --bg: #02040a;
  --ink: #f7f8fb;
  --muted: rgba(223, 230, 242, 0.68);
  --dim: rgba(223, 230, 242, 0.42);
  --line: rgba(205, 221, 244, 0.16);
  --cyan: #75e7ff;
  --mint: #9ef7bd;
  --gold: #d9ba74;
  --panel: rgba(7, 11, 18, 0.52);
  --panel-strong: rgba(9, 14, 22, 0.76);
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
}

body {
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
}

body.is-dragging { cursor: default; }

a { -webkit-user-drag: none; }

.webgl,
.drag-trail,
.grain,
.vignette {
  position: fixed;
  inset: 0;
}

.webgl {
  z-index: 0;
  width: 100%;
  height: 100%;
  display: block;
  background:
    radial-gradient(circle at 73% 30%, rgba(117, 231, 255, 0.09), transparent 28%),
    radial-gradient(circle at 22% 80%, rgba(217, 186, 116, 0.06), transparent 26%),
    linear-gradient(135deg, #02040a 0%, #060913 48%, #03040b 100%);
}

.grain {
  z-index: 1;
  pointer-events: none;
  opacity: 0.14;
  mix-blend-mode: screen;
  background-image:
    linear-gradient(110deg, rgba(255,255,255,0.055), transparent 34%, rgba(255,255,255,0.025)),
    repeating-radial-gradient(circle at 30% 20%, rgba(255,255,255,0.07) 0 1px, transparent 1px 6px);
}

.vignette {
  z-index: 2;
  pointer-events: none;
  background:
    radial-gradient(circle at 70% 46%, transparent 0%, rgba(2, 4, 10, 0.08) 38%, rgba(2, 4, 10, 0.82) 100%),
    linear-gradient(90deg, rgba(2, 4, 10, 0.88), rgba(2, 4, 10, 0.48) 31%, rgba(2, 4, 10, 0.02) 64%, rgba(2, 4, 10, 0.24));
}

.drag-trail {
  z-index: 5;
  pointer-events: none;
  mix-blend-mode: screen;
  opacity: 0.78;
  filter: saturate(1.12) brightness(0.82);
}

.hud {
  position: relative;
  z-index: 4;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: clamp(18px, 3vw, 44px);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: rgba(247, 248, 251, 0.88);
  font-size: 13px;
  letter-spacing: 0.14em;
}

.brand-mark {
  position: relative;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(205, 221, 244, 0.18);
  border-radius: 9px;
  background:
    linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)),
    rgba(7, 11, 18, 0.58);
  box-shadow: inset 0 0 22px rgba(117, 231, 255, 0.08), 0 18px 42px rgba(0, 0, 0, 0.34);
}

.brand-mark::before,
.brand-mark::after {
  content: "";
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(117, 231, 255, 0.82);
  border-radius: 4px;
  box-shadow: 0 0 16px rgba(117, 231, 255, 0.42);
}

.brand-mark::after {
  inset: 16px;
  border-color: rgba(158, 247, 189, 0.72);
  box-shadow: 0 0 12px rgba(158, 247, 189, 0.34);
}

.status {
  min-height: 34px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 0 13px;
  border: 1px solid rgba(158, 247, 189, 0.2);
  border-radius: 999px;
  background: rgba(158, 247, 189, 0.055);
  color: rgba(217, 255, 229, 0.82);
  font-size: 12px;
}

.status i {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 14px rgba(158, 247, 189, 0.75);
}

.hero {
  align-self: end;
  width: min(590px, 100%);
  margin-bottom: clamp(34px, 7vh, 84px);
  text-shadow: 0 20px 54px rgba(0, 0, 0, 0.78);
}

.kicker {
  display: inline-flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 18px;
  color: rgba(217, 186, 116, 0.9);
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.kicker::before {
  content: "";
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, rgba(217, 186, 116, 0.85), transparent);
}

h1 {
  max-width: 610px;
  margin: 0;
  font-size: clamp(44px, 5.1vw, 76px);
  line-height: 1.02;
  letter-spacing: 0;
  text-wrap: balance;
}

h1 span {
  display: block;
  color: transparent;
  background: linear-gradient(92deg, #ffffff 0%, #dfe8f9 38%, #75e7ff 70%, #9ef7bd 100%);
  -webkit-background-clip: text;
  background-clip: text;
  filter: drop-shadow(0 16px 30px rgba(117, 231, 255, 0.16));
}

.summary {
  width: min(540px, 100%);
  margin: 24px 0 0;
  color: var(--muted);
  font-size: clamp(15px, 1.34vw, 18px);
  line-height: 1.88;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 14px;
  margin-top: 34px;
}

.enter {
  --mx: 50%;
  --my: 50%;
  position: relative;
  isolation: isolate;
  cursor: pointer;
  min-height: 56px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0 23px 0 26px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  color: #051016;
  background:
    radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,0.8), transparent 24%),
    linear-gradient(135deg, #f3fbff 0%, #75e7ff 52%, #9ef7bd 100%);
  box-shadow: 0 18px 48px rgba(117, 231, 255, 0.2), inset 0 1px 0 rgba(255,255,255,0.72);
  font-size: 16px;
  font-weight: 800;
  text-decoration: none;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.enter::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,0.76), transparent);
  transform: translateX(-130%);
  transition: transform 0.62s ease;
}

.enter:hover {
  transform: translateY(-3px);
  box-shadow: 0 25px 72px rgba(117, 231, 255, 0.28), inset 0 1px 0 rgba(255,255,255,0.8);
}

.enter:hover::before { transform: translateX(130%); }

.enter svg {
  width: 19px;
  height: 19px;
  transition: transform 0.22s ease;
}

.enter:hover svg { transform: translateX(4px); }

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
}

.meta span {
  min-height: 32px;
  display: inline-flex;
  align-items: center;
  padding: 0 11px;
  border: 1px solid rgba(205, 221, 244, 0.13);
  border-radius: 999px;
  background: rgba(7, 11, 18, 0.42);
  color: var(--dim);
  font-size: 12px;
  backdrop-filter: blur(18px);
}

.dock {
  align-self: end;
  width: min(780px, 100%);
  display: grid;
  grid-template-columns: repeat(4, minmax(118px, 1fr));
  gap: 10px;
}

.module {
  position: relative;
  min-height: 82px;
  padding: 14px;
  overflow: hidden;
  border: 1px solid rgba(205, 221, 244, 0.14);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.035), transparent),
    var(--panel);
  box-shadow: 0 24px 76px rgba(0,0,0,0.36);
  backdrop-filter: blur(20px);
}

.module::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(117, 231, 255, 0.07), transparent);
  transform: translateX(-130%);
  animation: sweep 7s ease-in-out infinite;
}

.module:nth-child(2)::before { animation-delay: 0.7s; }
.module:nth-child(3)::before { animation-delay: 1.4s; }
.module:nth-child(4)::before { animation-delay: 2.1s; }

.module b {
  display: block;
  color: rgba(247, 248, 251, 0.92);
  font-size: 13px;
  letter-spacing: 0.1em;
}

.module span {
  display: block;
  margin-top: 9px;
  color: var(--dim);
  font-size: 12px;
  line-height: 1.55;
}

.fallback {
  position: fixed;
  left: 50%;
  bottom: 18px;
  z-index: 7;
  display: none;
  width: min(620px, calc(100% - 32px));
  transform: translateX(-50%);
  padding: 13px 16px;
  border: 1px solid rgba(217, 186, 116, 0.28);
  border-radius: 10px;
  background: rgba(14, 11, 5, 0.82);
  color: rgba(255, 239, 197, 0.92);
  font-size: 13px;
  line-height: 1.55;
  backdrop-filter: blur(18px);
}

@keyframes sweep {
  0%, 76% { transform: translateX(-130%); }
  100% { transform: translateX(130%); }
}

@media (max-width: 860px) {
  body { overflow-y: auto; }
  .hud {
    min-height: 100svh;
    padding: 18px;
  }
  .topbar { align-items: flex-start; }
  .status { display: none; }
  .hero {
    margin-bottom: 26px;
    padding-top: 47vh;
  }
  h1 {
    max-width: 370px;
    font-size: clamp(40px, 12vw, 58px);
  }
  .summary {
    max-width: 360px;
    font-size: 15px;
  }
  .actions { align-items: flex-start; }
  .meta { width: 100%; }
  .dock {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    padding-bottom: 18px;
  }
  .module { min-height: 78px; }
}

@media (max-width: 520px) {
  .brand {
    gap: 10px;
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  .brand-mark {
    width: 34px;
    height: 34px;
  }
  .hero { padding-top: 42vh; }
  h1 { font-size: clamp(36px, 10.8vw, 50px); }
  .summary {
    font-size: 14px;
    line-height: 1.65;
  }
  .actions { margin-top: 22px; }
  .enter { width: 100%; }
  .dock { grid-template-columns: 1fr; }
  .module:nth-child(n+3) { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<main class="hud">
  <header class="topbar">
    <div class="brand"><span class="brand-mark" aria-hidden="true"></span> 计组训练舱</div>
    <div class="status"><i></i> WebGL scene online</div>
  </header>

  <section class="hero">
    <div class="kicker">Computer Organization</div>
    <h1>计算机组成原理<span>题库训练舱</span></h1>
    <p class="summary">把总线、存储器、指令系统、CPU 与控制单元沉入一块低光电路板，进入后开始填空练习、随机抽题和即时核对答案。</p>
    <div class="actions">
      <a class="enter" id="enterBtn" href="./计组填空题库.html" aria-label="进入计算机组成原理填空题库">
        进入题库答题
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="m13 6 6 6-6 6"></path>
        </svg>
      </a>
      <div class="meta" aria-label="题库信息">
        <span>30 道填空题</span>

      </div>

    <div class="module"><b>CPU</b><span>指令周期、取指与执行控制</span></div>

<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

const canvas = document.getElementById("webgl");
const trailCanvas = document.getElementById("dragTrail");
const trailCtx = trailCanvas.getContext("2d");
const fallback = document.getElementById("fallback");
const enterBtn = document.getElementById("enterBtn");

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02040a, 0.055);

const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 70);
camera.position.set(0.25, 1.2, 8.4);

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,
  powerPreference: "high-performance"
});
renderer.setClearColor(0x02040a, 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.24, 0.28, 0.7);
composer.addPass(bloom);

const clock = new THREE.Clock();
const pointer = new THREE.Vector2();
const targetPointer = new THREE.Vector2();
let dragEnergy = 0;

const rig = new THREE.Group();
scene.add(rig);

function roundedRect(width, height, radius) {
  const x = -width / 2;
  const y = -height / 2;
  const shape = new THREE.Shape();
  shape.moveTo(x + radius, y);
  shape.lineTo(x + width - radius, y);
  shape.quadraticCurveTo(x + width, y, x + width, y + radius);
  shape.lineTo(x + width, y + height - radius);
  shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  shape.lineTo(x + radius, y + height);
  shape.quadraticCurveTo(x, y + height, x, y + height - radius);
  shape.lineTo(x, y + radius);
  shape.quadraticCurveTo(x, y, x + radius, y);
  return shape;
}

function makeTexture() {
  const size = 1800;
  const c = document.createElement("canvas");
  c.width = size;
  c.height = size;
  const g = c.getContext("2d");
  const rnd = n => {
    const x = Math.sin(n * 12.9898) * 43758.5453;
    return x - Math.floor(x);
  };

  function roundRect(x, y, w, h, r) {
    g.beginPath();
    g.moveTo(x + r, y);
    g.lineTo(x + w - r, y);
    g.quadraticCurveTo(x + w, y, x + w, y + r);
    g.lineTo(x + w, y + h - r);
    g.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    g.lineTo(x + r, y + h);
    g.quadraticCurveTo(x, y + h, x, y + h - r);
    g.lineTo(x, y + r);
    g.quadraticCurveTo(x, y, x + r, y);
  }

  function drawTrace(points, color, width, glow = 0) {
    g.save();
    g.lineCap = "round";
    g.lineJoin = "round";
    if (glow) {
      g.shadowColor = color;
      g.shadowBlur = glow;
    }
    g.strokeStyle = color;
    g.lineWidth = width;
    g.beginPath();
    g.moveTo(points[0][0], points[0][1]);
    for (let i = 1; i < points.length; i++) g.lineTo(points[i][0], points[i][1]);
    g.stroke();
    g.restore();
  }

  function via(x, y, r, color = "rgba(117,231,255,0.26)") {
    g.fillStyle = "rgba(2,5,9,0.72)";
    g.beginPath();
    g.arc(x, y, r + 3, 0, Math.PI * 2);
    g.fill();
    g.fillStyle = color;
    g.beginPath();
    g.arc(x, y, r, 0, Math.PI * 2);
    g.fill();
    g.fillStyle = "rgba(255,255,255,0.18)";
    g.beginPath();
    g.arc(x - r * 0.28, y - r * 0.28, Math.max(1.2, r * 0.22), 0, Math.PI * 2);
    g.fill();
  }

  g.fillStyle = "#05070d";
  g.fillRect(0, 0, size, size);

  const radial = g.createRadialGradient(1040, 540, 35, 820, 770, 1050);
  radial.addColorStop(0, "rgba(88,147,164,0.27)");
  radial.addColorStop(0.34, "rgba(23,45,54,0.26)");
  radial.addColorStop(1, "rgba(0,0,0,0)");
  g.fillStyle = radial;
  g.fillRect(0, 0, size, size);

  g.strokeStyle = "rgba(146,176,201,0.045)";
  g.lineWidth = 1;
  for (let i = 72; i < size; i += 36) {
    g.beginPath();
    g.moveTo(i, 0);
    g.lineTo(i, size);
    g.moveTo(0, i);
    g.lineTo(size, i);
    g.stroke();
  }

  g.strokeStyle = "rgba(217,186,116,0.055)";
  g.lineWidth = 2;
  for (let i = 144; i < size; i += 144) {
    g.beginPath();
    g.moveTo(i, 0);
    g.lineTo(i, size);
    g.moveTo(0, i);
    g.lineTo(size, i);
    g.stroke();
  }

  [
    [150, 145, 450, 210, 26, "rgba(217,186,116,0.09)"],
    [1150, 155, 410, 255, 28, "rgba(117,231,255,0.085)"],
    [105, 1195, 540, 275, 30, "rgba(158,247,189,0.07)"],
    [1130, 1185, 490, 250, 30, "rgba(217,186,116,0.075)"],
    [710, 124, 268, 164, 22, "rgba(255,255,255,0.045)"]
  ].forEach(([x, y, w, h, r, color]) => {
    roundRect(x, y, w, h, r);
    g.fillStyle = color;
    g.fill();
    g.strokeStyle = "rgba(255,255,255,0.055)";
    g.lineWidth = 2;
    g.stroke();
  });

  const buses = [
    [[145, 420], [390, 420], [390, 600], [735, 600], [735, 770]],
    [[1650, 388], [1390, 388], [1390, 552], [1044, 552], [1044, 755]],
    [[210, 900], [515, 900], [515, 790], [730, 790]],
    [[1600, 980], [1294, 980], [1294, 820], [1048, 820]],
    [[360, 1335], [620, 1335], [620, 1080], [845, 1080]],
    [[1440, 1290], [1230, 1290], [1230, 1072], [1000, 1072]],
    [[742, 250], [742, 420], [890, 420], [890, 622]],
    [[1032, 245], [1032, 438], [905, 438], [905, 622]]
  ];
  buses.forEach((points, i) => {
    drawTrace(points, i % 2 ? "rgba(158,247,189,0.44)" : "rgba(117,231,255,0.47)", i % 3 === 0 ? 8 : 6, 10);
    points.forEach(p => via(p[0], p[1], i % 2 ? 10 : 8));
  });

  for (let i = 0; i < 430; i++) {
    const x = 82 + rnd(i + 1) * (size - 164);
    const y = 86 + rnd(i + 17) * (size - 172);
    const horizontal = rnd(i + 31) > 0.42;
    const len = 70 + rnd(i + 47) * 310;
    const jog = 28 + rnd(i + 63) * 150;
    const dir = rnd(i + 79) > 0.5 ? 1 : -1;
    const color = i % 13 === 0
      ? "rgba(217,186,116,0.26)"
      : i % 7 === 0
        ? "rgba(158,247,189,0.20)"
        : "rgba(142,173,204,0.105)";
    const width = i % 13 === 0 ? 3.2 : i % 7 === 0 ? 2.3 : 1.35;
    const points = horizontal
      ? [[x, y], [Math.min(size - 80, x + len), y], [Math.min(size - 80, x + len), Math.max(70, Math.min(size - 70, y + jog * dir))]]
      : [[x, y], [x, Math.min(size - 80, y + len)], [Math.max(70, Math.min(size - 70, x + jog * dir)), Math.min(size - 80, y + len)]];
    drawTrace(points, color, width, i % 13 === 0 ? 4 : 0);
    if (i % 4 === 0) points.forEach(p => via(p[0], p[1], i % 13 === 0 ? 5.2 : 3.4, color));
  }

  roundRect(695, 610, 410, 390, 28);
  g.fillStyle = "rgba(2,5,9,0.55)";
  g.fill();
  g.strokeStyle = "rgba(255,255,255,0.12)";
  g.lineWidth = 3;
  g.stroke();
  for (let ix = 0; ix < 17; ix++) {
    for (let iy = 0; iy < 13; iy++) {
      const x = 736 + ix * 20;
      const y = 648 + iy * 24;

function resizeTrail() {
  trailDpr = Math.min(window.devicePixelRatio || 1, 2);
  trailCanvas.width = Math.floor(window.innerWidth * trailDpr);
  trailCanvas.height = Math.floor(window.innerHeight * trailDpr);
  trailCanvas.style.width = window.innerWidth + "px";
  trailCanvas.style.height = window.innerHeight + "px";
  trailCtx.setTransform(trailDpr, 0, 0, trailDpr, 0, 0);
  trailCtx.imageSmoothingEnabled = true;
}

function addTrailPoint(x, y, pressure = 1, strength = 0.34) {
  const now = performance.now();
  let velocity = 0;
  if (lastTrailPoint) {
    const dx = x - lastTrailPoint.x;
    const dy = y - lastTrailPoint.y;
    velocity = Math.hypot(dx, dy);
    if (velocity < 1.8) return;
  }
  const point = { x, y, t: now, pressure, velocity, strength };
  trailPoints.push(point);
  if (trailPoints.length > 96) trailPoints.shift();
  lastTrailPoint = point;
  dragHead = { x, y, t: now };

  const burst = Math.max(1, Math.min(9, Math.floor(1 + velocity * 0.08 + strength * 5)));
  for (let i = 0; i < burst; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.35 + Math.random() * 1.65 + Math.min(1.2, velocity * 0.018);
    sparks.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.3,
      life: 360 + Math.random() * 360,
      t: now,
      r: 0.8 + Math.random() * 1.8,
      hue: Math.random(),
      kind: i % 5 === 0 ? "dash" : "dot",
      strength
    });
  }
}

function addRipple(x, y) {
  ripples.push({ x, y, t: performance.now(), life: 620, spin: Math.random() * Math.PI });
}

function drawTrail() {
  const now = performance.now();
  trailCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  trailCtx.save();
  trailCtx.globalCompositeOperation = "lighter";

  trailPoints = trailPoints.filter(p => now - p.t < 760);
  if (trailPoints.length > 1) {
    for (let i = 1; i < trailPoints.length; i++) {
      const a = trailPoints[i - 1];
      const b = trailPoints[i];
      const age = now - b.t;
      const alpha = Math.max(0, 1 - age / 760);
      const strength = b.strength || 0.34;
      const speedBoost = Math.min(0.85, (b.velocity || 0) / 70);
      const grad = trailCtx.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, `rgba(117, 231, 255, ${alpha * strength * 0.32})`);
      grad.addColorStop(0.48, `rgba(255, 255, 255, ${alpha * strength * 0.38})`);
      grad.addColorStop(1, `rgba(158, 247, 189, ${alpha * strength * 0.42})`);
      trailCtx.strokeStyle = grad;
      trailCtx.lineWidth = 3.8 + alpha * (7.2 + strength * 5.5) + speedBoost * 3.2;
      trailCtx.lineCap = "round";
      trailCtx.lineJoin = "round";
      trailCtx.shadowColor = "rgba(117,231,255,0.52)";
      trailCtx.shadowBlur = 20 * alpha * strength;
      trailCtx.beginPath();
      trailCtx.moveTo(a.x, a.y);
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      trailCtx.quadraticCurveTo(a.x, a.y, mx, my);
      trailCtx.stroke();

      trailCtx.strokeStyle = `rgba(3, 11, 17, ${alpha * 0.24})`;
      trailCtx.lineWidth = 2.8 + alpha * 3.4;
      trailCtx.shadowBlur = 0;
      trailCtx.beginPath();
      trailCtx.moveTo(a.x, a.y);
      trailCtx.quadraticCurveTo(a.x, a.y, mx, my);
      trailCtx.stroke();

      trailCtx.strokeStyle = `rgba(217, 186, 116, ${alpha * strength * 0.22})`;
      trailCtx.lineWidth = 1.1 + speedBoost;
      trailCtx.shadowColor = "rgba(217,186,116,0.42)";
      trailCtx.shadowBlur = 8 * alpha * strength;
      trailCtx.beginPath();
      trailCtx.moveTo(a.x + 6, a.y - 4);
      trailCtx.lineTo(b.x + 6, b.y - 4);
      trailCtx.stroke();

      if (i % 6 === 0) {
        trailCtx.fillStyle = `rgba(117,231,255,${alpha * strength * 0.34})`;
        trailCtx.shadowColor = "rgba(117,231,255,0.44)";
        trailCtx.shadowBlur = 8 * alpha * strength;
        trailCtx.save();
        trailCtx.translate(b.x, b.y);
        trailCtx.rotate((b.x + b.y) * 0.012);
        trailCtx.fillRect(-2.2 * alpha, -2.2 * alpha, 4.4 * alpha, 4.4 * alpha);
        trailCtx.restore();
      }
    }

    const head = trailPoints[trailPoints.length - 1];
    const headAge = now - head.t;
    const headAlpha = Math.max(0, 1 - headAge / 520);
    const headStrength = head.strength || 0.34;
    const haloRadius = 38 + headStrength * 34;
    const halo = trailCtx.createRadialGradient(head.x, head.y, 0, head.x, head.y, haloRadius);
    halo.addColorStop(0, `rgba(255,255,255,${headAlpha * headStrength * 0.36})`);
    halo.addColorStop(0.22, `rgba(117,231,255,${headAlpha * headStrength * 0.2})`);
    halo.addColorStop(0.58, `rgba(158,247,189,${headAlpha * headStrength * 0.08})`);
    halo.addColorStop(1, "rgba(117,231,255,0)");
    trailCtx.fillStyle = halo;
    trailCtx.beginPath();
    trailCtx.arc(head.x, head.y, haloRadius, 0, Math.PI * 2);
    trailCtx.fill();
  }

  if (dragHead && now - dragHead.t < 160) {
    const p = Math.max(0, 1 - (now - dragHead.t) / 160);
    trailCtx.strokeStyle = `rgba(255,255,255,${p * 0.22})`;
    trailCtx.lineWidth = 1;
    trailCtx.shadowColor = "rgba(117,231,255,0.36)";
    trailCtx.shadowBlur = 9 * p;
    trailCtx.beginPath();
    trailCtx.arc(dragHead.x, dragHead.y, 5 + 8 * (1 - p), 0, Math.PI * 2);
    trailCtx.stroke();
  }

  sparks = sparks.filter(s => now - s.t < s.life);
  sparks.forEach(s => {
    const age = now - s.t;
    const alpha = Math.max(0, 1 - age / s.life);
    const strength = s.strength || 0.34;
    s.x += s.vx;
    s.y += s.vy;
    s.vx *= 0.976;
    s.vy = s.vy * 0.976 + 0.018;
    const gold = s.hue > 0.68;
    trailCtx.fillStyle = gold ? `rgba(217,186,116,${alpha * strength * 0.48})` : `rgba(117,231,255,${alpha * strength * 0.5})`;
    trailCtx.strokeStyle = trailCtx.fillStyle;
    trailCtx.shadowColor = s.hue > 0.72 ? "rgba(217,186,116,0.38)" : "rgba(117,231,255,0.42)";
    trailCtx.shadowBlur = 7 * alpha * strength;
    if (s.kind === "dash") {
      trailCtx.lineWidth = Math.max(0.7, s.r * alpha * 0.5);
      trailCtx.beginPath();
      trailCtx.moveTo(s.x, s.y);
      trailCtx.lineTo(s.x - s.vx * 2.6, s.y - s.vy * 2.6);
      trailCtx.stroke();
    } else {
      trailCtx.beginPath();
      trailCtx.arc(s.x, s.y, s.r * alpha * 0.78, 0, Math.PI * 2);
      trailCtx.fill();
    }
  });

  ripples = ripples.filter(r => now - r.t < r.life);
  ripples.forEach(r => {
    const age = now - r.t;
    const p = age / r.life;
    trailCtx.strokeStyle = `rgba(117, 231, 255, ${(1 - p) * 0.22})`;
    trailCtx.lineWidth = 1.2;
    trailCtx.shadowColor = "rgba(117,231,255,0.28)";
    trailCtx.shadowBlur = 10 * (1 - p);
    trailCtx.beginPath();
    trailCtx.arc(r.x, r.y, 10 + p * 58, 0, Math.PI * 2);
    trailCtx.stroke();
    trailCtx.save();
    trailCtx.translate(r.x, r.y);
    trailCtx.rotate(r.spin + p * 1.6);
    trailCtx.setLineDash([9, 9]);
    trailCtx.strokeStyle = `rgba(217, 186, 116, ${(1 - p) * 0.12})`;
    trailCtx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI * 2 * i) / 6;
      const rr = 18 + p * 68;
      const x = Math.cos(angle) * rr;
      const y = Math.sin(angle) * rr;
      if (i === 0) trailCtx.moveTo(x, y);
      else trailCtx.lineTo(x, y);
    }
    trailCtx.closePath();
    trailCtx.stroke();
    trailCtx.restore();
  });

  trailCtx.restore();
  requestAnimationFrame(drawTrail);
}

function pointerMove(event) {
  targetPointer.x = (event.clientX / window.innerWidth) * 2 - 1;
  targetPointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
  if ((event.buttons & 1) && !isDragging) pointerDown(event);
  const strength = isDragging ? 0.52 : 0.28;
  addTrailPoint(event.clientX, event.clientY, event.pressure || 1, strength);
}

function pointerDown(event) {
  isDragging = true;
  document.body.classList.add("is-dragging");
  lastTrailPoint = null;
  dragHead = { x: event.clientX, y: event.clientY, t: performance.now() };
  addRipple(event.clientX, event.clientY);
  addTrailPoint(event.clientX, event.clientY, event.pressure || 1, 0.52);
}

function pointerUp() {
  if (dragHead) addRipple(dragHead.x, dragHead.y);
  isDragging = false;
  document.body.classList.remove("is-dragging");
  lastTrailPoint = null;
}

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
  renderer.setSize(w, h);
  composer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
  composer.setSize(w, h);
  resizeTrail();

  if (w < 860) {
      boardGroup.position.set(0.38, 2.32, -1.45);
      boardGroup.rotation.set(-0.48, -0.1, -0.02);
    boardGroup.scale.setScalar(0.55);
    camera.position.set(0.1, 0.82, 8.55);
  } else {
    boardGroup.position.set(3.12, 0.05, -1.35);
    boardGroup.rotation.set(-0.5, -0.24, -0.04);
    boardGroup.scale.setScalar(0.92);
    camera.position.set(0.08, 1.2, 8.6);
  }
}

function buttonGlow(event) {
  const rect = enterBtn.getBoundingClientRect();
  enterBtn.style.setProperty("--mx", `${((event.clientX - rect.left) / rect.width) * 100}%`);
  enterBtn.style.setProperty("--my", `${((event.clientY - rect.top) / rect.height) * 100}%`);
}

function animate() {
  const elapsed = clock.getElapsedTime();
  pointer.lerp(targetPointer, 0.075);
  dragEnergy += ((isDragging ? 1 : 0) - dragEnergy) * 0.08;

  const mobile = window.innerWidth < 860;
  const baseRotX = mobile ? -0.48 : -0.5;
  const baseRotY = mobile ? -0.1 : -0.24;
  const baseRotZ = mobile ? -0.02 : -0.04;

  rig.rotation.y = pointer.x * 0.055 + dragEnergy * pointer.x * 0.035;
  rig.rotation.x = -pointer.y * 0.035;
  boardGroup.rotation.x = baseRotX + Math.sin(elapsed * 0.48) * 0.018 + pointer.y * 0.035;
  boardGroup.rotation.y = baseRotY + Math.sin(elapsed * 0.34) * 0.024 + pointer.x * 0.075;
  boardGroup.rotation.z = baseRotZ + Math.sin(elapsed * 0.38) * 0.012 + dragEnergy * pointer.x * 0.018;

  boardTexture.offset.x = elapsed * 0.003;
  boardTexture.offset.y = elapsed * 0.0015;
  stars.rotation.y = elapsed * 0.012;
  stars.rotation.x = Math.sin(elapsed * 0.16) * 0.01;

  liveTraces.forEach((mesh, i) => {
    const pulse = Math.sin(elapsed * 1.9 + i * 0.58) * 0.5 + 0.5;
    mesh.material.opacity = 0.36 + pulse * 0.36 + dragEnergy * 0.14;
    mesh.scale.z = 1 + pulse * 0.8 + dragEnergy * 0.55;
  });

  dataDots.forEach(dot => {
    const t = (dot.userData.offset + elapsed * dot.userData.speed) % 1;
    dot.position.copy(dot.userData.path.getPointAt(t));
    dot.material.opacity = 0.34 + Math.sin(elapsed * 2.2 + t * 8) * 0.16 + dragEnergy * 0.22;
    dot.scale.setScalar(1 + dragEnergy * 0.8);
  });

  activeLeds.forEach((led, i) => {
    const pulse = Math.sin(elapsed * 2.7 + led.userData.phase) * 0.5 + 0.5;
    led.material.opacity = 0.46 + pulse * 0.44 + dragEnergy * 0.24;
    led.scale.setScalar(0.82 + pulse * 0.3 + dragEnergy * 0.65);
  });

  rim.intensity = 4.2 + Math.sin(elapsed * 1.15) * 0.55 + dragEnergy * 2.2;
  warm.intensity = 1.9 + Math.cos(elapsed * 1.07) * 0.25 + dragEnergy * 0.8;
  boardMat.emissiveIntensity = 0.08 + dragEnergy * 0.1;
  packageMat.emissiveIntensity = 0.16 + dragEnergy * 0.08;
  bloom.strength = 0.25 + dragEnergy * 0.24 + Math.sin(elapsed * 0.8) * 0.018;
  renderer.toneMappingExposure = 0.93 + dragEnergy * 0.07;

  camera.lookAt(mobile ? 0.05 : 1.35, mobile ? 1.2 : 0.12, -0.58);
  composer.render();
  requestAnimationFrame(animate);
}

window.addEventListener("resize", resize);
window.addEventListener("pointermove", pointerMove);
window.addEventListener("pointerdown", pointerDown);
window.addEventListener("pointerup", pointerUp);
window.addEventListener("pointercancel", pointerUp);
if (!("PointerEvent" in window)) {
  window.addEventListener("mousemove", pointerMove);
  window.addEventListener("mousedown", pointerDown);
  window.addEventListener("mouseup", pointerUp);
}
enterBtn.addEventListener("pointermove", buttonGlow);
window.addEventListener("keydown", event => {
  if (event.key === "Enter") window.location.href = "./计组填空题库.html";
});
window.addEventListener("error", () => {
  fallback.style.display = "block";
});

resize();
drawTrail();
requestAnimationFrame(animate);
</script>
</body>
</html>

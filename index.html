<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算机组成原理 · 题库训练舱</title>
<style>
:root {
  color-scheme: dark;
  --bg: #05060d;
  --ink: #f7f8fc;
  --muted: rgba(239, 242, 252, 0.74);
  --dim: rgba(239, 242, 252, 0.5);
  --line: rgba(226, 232, 255, 0.17);
  --cyan: #72e7ff;
  --sakura: #ff7ab8;
  --violet: #b7a3ff;
  --panel: rgba(8, 10, 22, 0.58);
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
}

body {
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
}

body.is-dragging { cursor: default; }

a { -webkit-user-drag: none; }

.video-stage,
.hero-video,
.video-poster,
.ambient-field,
.drag-trail,
.grain,
.vignette {
  position: fixed;
  inset: 0;
}

.video-stage {
  z-index: 0;
  overflow: hidden;
  background:
    radial-gradient(circle at 72% 28%, rgba(255, 122, 184, 0.2), transparent 28%),
    radial-gradient(circle at 19% 82%, rgba(114, 231, 255, 0.14), transparent 30%),
    linear-gradient(135deg, #05060d 0%, #10122a 47%, #080813 100%);
}

.hero-video,
.video-poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-video {
  z-index: 1;
  opacity: 0;
  filter: saturate(1.2) contrast(1.08) brightness(0.74) hue-rotate(-7deg);
  transition: opacity 900ms ease;
}

body.video-ready .hero-video { opacity: 1; }
body.motion-reduced .hero-video { display: none; }

.video-poster {
  z-index: 0;
  display: block;
  background-image: url("./assets/hero-poster.jpg");
  background-size: cover;
  background-position: center;
  transform: scale(1.01);
}

.ambient-field {
  z-index: 2;
  pointer-events: none;
  opacity: 0.9;
  background:
    radial-gradient(circle at calc(52% + var(--px, 0px) * 26) calc(43% + var(--py, 0px) * -22), rgba(255, 122, 184, 0.18), transparent 20%),
    radial-gradient(circle at calc(68% + var(--px, 0px) * -18) calc(33% + var(--py, 0px) * 18), rgba(114, 231, 255, 0.13), transparent 19%),
    linear-gradient(90deg, rgba(5, 6, 13, 0.9), rgba(5, 6, 13, 0.42) 45%, rgba(5, 6, 13, 0.2));
  mix-blend-mode: screen;
  transform: translate3d(calc(var(--px, 0px) * -7), calc(var(--py, 0px) * 7), 0);
  transition: opacity 260ms ease;
}

.grain {
  z-index: 2;
  pointer-events: none;
  opacity: 0.18;
  mix-blend-mode: soft-light;
  background-image:
    linear-gradient(110deg, rgba(255,255,255,0.06), transparent 34%, rgba(255,122,184,0.035)),
    repeating-linear-gradient(180deg, rgba(255,255,255,0.07) 0 1px, transparent 1px 7px);
}

.vignette {
  z-index: 3;
  pointer-events: none;
  background:
    radial-gradient(circle at 74% 38%, transparent 0%, rgba(5, 6, 13, 0.07) 34%, rgba(5, 6, 13, 0.86) 100%),
    linear-gradient(90deg, rgba(5, 6, 13, 0.94), rgba(5, 6, 13, 0.6) 33%, rgba(5, 6, 13, 0.14) 64%, rgba(5, 6, 13, 0.4)),
    linear-gradient(0deg, rgba(5, 6, 13, 0.74), transparent 44%, rgba(5, 6, 13, 0.32));
}

.drag-trail {
  z-index: 6;
  pointer-events: none;
  mix-blend-mode: screen;
  opacity: 0.78;
  filter: saturate(1.12) brightness(0.86);
}

.hud {
  position: relative;
  z-index: 5;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: clamp(18px, 3vw, 44px);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: rgba(247, 248, 251, 0.9);
  font-size: 13px;
  letter-spacing: 0.14em;
}

.brand-mark {
  position: relative;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(255, 122, 184, 0.24);
  border-radius: 9px;
  background:
    linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,122,184,0.04)),
    rgba(8, 10, 22, 0.66);
  box-shadow: inset 0 0 24px rgba(255, 122, 184, 0.12), 0 18px 42px rgba(0, 0, 0, 0.38);
}

.brand-mark::before,
.brand-mark::after {
  content: "";
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(114, 231, 255, 0.82);
  border-radius: 4px;
  box-shadow: 0 0 16px rgba(114, 231, 255, 0.42);
}

.brand-mark::after {
  inset: 16px;
  border-color: rgba(255, 122, 184, 0.76);
  box-shadow: 0 0 12px rgba(255, 122, 184, 0.4);
}

.status {
  min-height: 34px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 0 13px;
  border: 1px solid rgba(255, 122, 184, 0.24);
  border-radius: 999px;
  background: rgba(255, 122, 184, 0.075);
  color: rgba(255, 223, 239, 0.86);
  font-size: 12px;
  backdrop-filter: blur(18px);
}

.status i {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--sakura);
  box-shadow: 0 0 14px rgba(255, 122, 184, 0.78);
}

.hero {
  align-self: end;
  width: min(590px, 100%);
  margin-bottom: clamp(34px, 7vh, 84px);
  text-shadow: 0 20px 54px rgba(0, 0, 0, 0.78);
  transform: translate3d(calc(var(--px, 0px) * 4), calc(var(--py, 0px) * -4), 0);
  transition: transform 120ms linear;
}

.kicker {
  display: inline-flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 18px;
  color: rgba(255, 185, 219, 0.94);
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.kicker::before {
  content: "";
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, rgba(255, 122, 184, 0.86), transparent);
}

h1 {
  max-width: 610px;
  margin: 0;
  font-size: clamp(44px, 5.1vw, 76px);
  line-height: 1.02;
  letter-spacing: 0;
  text-wrap: balance;
}

h1 span {
  display: block;
  color: transparent;
  background: linear-gradient(92deg, #ffffff 0%, #f8d5ea 34%, #ff7ab8 60%, #72e7ff 100%);
  -webkit-background-clip: text;
  background-clip: text;
  filter: drop-shadow(0 16px 30px rgba(255, 122, 184, 0.18));
}

.summary {
  width: min(540px, 100%);
  margin: 24px 0 0;
  color: var(--muted);
  font-size: clamp(15px, 1.34vw, 18px);
  line-height: 1.88;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 14px;
  margin-top: 34px;
}

.enter {
  --mx: 50%;
  --my: 50%;
  position: relative;
  isolation: isolate;
  cursor: pointer;
  min-height: 56px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0 23px 0 26px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  color: #051016;
  background:
    radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,0.8), transparent 24%),
    linear-gradient(135deg, #fff5fb 0%, #ff7ab8 47%, #72e7ff 100%);
  box-shadow: 0 18px 52px rgba(255, 122, 184, 0.24), 0 0 42px rgba(114, 231, 255, 0.12), inset 0 1px 0 rgba(255,255,255,0.72);
  font-size: 16px;
  font-weight: 800;
  text-decoration: none;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.enter::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,0.76), transparent);
  transform: translateX(-130%);
  transition: transform 0.62s ease;
}

.enter:hover {
  transform: translateY(-3px);
  box-shadow: 0 25px 76px rgba(255, 122, 184, 0.32), 0 0 52px rgba(114, 231, 255, 0.18), inset 0 1px 0 rgba(255,255,255,0.8);
}

.enter:hover::before { transform: translateX(130%); }

.enter svg {
  width: 19px;
  height: 19px;
  transition: transform 0.22s ease;
}

.enter:hover svg { transform: translateX(4px); }

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
}

.meta span {
  min-height: 32px;
  display: inline-flex;
  align-items: center;
  padding: 0 11px;
  border: 1px solid rgba(226, 232, 255, 0.16);
  border-radius: 999px;
  background: rgba(8, 10, 22, 0.5);
  color: var(--dim);
  font-size: 12px;
  backdrop-filter: blur(18px);
}

.dock {
  align-self: end;
  width: min(780px, 100%);
  display: grid;
  grid-template-columns: repeat(4, minmax(118px, 1fr));
  gap: 10px;
}

.module {
  position: relative;
  min-height: 82px;
  padding: 14px;
  overflow: hidden;
  border: 1px solid rgba(226, 232, 255, 0.15);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.035), transparent),
    var(--panel);
  box-shadow: 0 24px 76px rgba(0,0,0,0.36);
  backdrop-filter: blur(20px);
}

.module::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255, 122, 184, 0.08), rgba(114, 231, 255, 0.07), transparent);
  transform: translateX(-130%);
  animation: sweep 7s ease-in-out infinite;
}

.module:nth-child(2)::before { animation-delay: 0.7s; }
.module:nth-child(3)::before { animation-delay: 1.4s; }
.module:nth-child(4)::before { animation-delay: 2.1s; }

.module b {
  display: block;
  color: rgba(247, 248, 251, 0.92);
  font-size: 13px;
  letter-spacing: 0.1em;
}

.module span {
  display: block;
  margin-top: 9px;
  color: var(--dim);
  font-size: 12px;
  line-height: 1.55;
}

.fallback {
  position: fixed;
  left: 50%;
  bottom: 18px;
  z-index: 8;
  display: none;
  width: min(620px, calc(100% - 32px));
  transform: translateX(-50%);
  padding: 13px 16px;
  border: 1px solid rgba(255, 122, 184, 0.28);
  border-radius: 10px;
  background: rgba(18, 8, 18, 0.84);
  color: rgba(255, 223, 239, 0.92);
  font-size: 13px;
  line-height: 1.55;
  backdrop-filter: blur(18px);
}

@keyframes sweep {
  0%, 76% { transform: translateX(-130%); }
  100% { transform: translateX(130%); }
}

@media (max-width: 860px) {
  body { overflow-y: auto; }
  .hud {
    min-height: 100svh;
    padding: 18px;
  }
  .topbar { align-items: flex-start; }
  .status { display: none; }
  .hero {
    margin-bottom: 26px;
    padding-top: 47vh;
  }
  h1 {
    max-width: 370px;
    font-size: clamp(40px, 12vw, 58px);
  }
  .summary {
    max-width: 360px;
    font-size: 15px;
  }
  .actions { align-items: flex-start; }
  .meta { width: 100%; }
  .dock {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    padding-bottom: 18px;
  }
  .module { min-height: 78px; }
}

@media (max-width: 520px) {
  .brand {
    gap: 10px;
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  .brand-mark {
    width: 34px;
    height: 34px;
  }
  .hero { padding-top: 42vh; }
  h1 { font-size: clamp(36px, 10.8vw, 50px); }
  .summary {
    font-size: 14px;
    line-height: 1.65;
  }
  .actions { margin-top: 22px; }
  .enter {
    width: 100%;
    max-width: calc(100vw - 36px);
  }
  .dock { grid-template-columns: 1fr; }
  .module:nth-child(n+3) { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
  .ambient-field,
  .hero {
    transform: none !important;
  }
  .drag-trail { display: none; }
}
</style>
</head>
<body>
<div class="video-stage" aria-hidden="true">
  <picture>
    <source srcset="./assets/hero-poster.jpg" type="image/jpeg">
    <img class="video-poster" src="./assets/hero-poster.jpg" alt="">
  </picture>
  <video class="hero-video" id="heroVideo" autoplay muted loop playsinline preload="metadata" poster="./assets/hero-poster.jpg">
    <source src="./assets/hero.webm" type="video/webm">
    <source src="./assets/hero.mp4" type="video/mp4">
  </video>
  <div class="ambient-field" aria-hidden="true"></div>
</div>
<canvas class="drag-trail" id="dragTrail" aria-hidden="true"></canvas>
<div class="grain" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
<div class="fallback" id="fallback">视频背景未能加载，已自动使用静态海报。入口和题库功能不受影响。</div>

<main class="hud">
  <header class="topbar">
    <div class="brand"><span class="brand-mark" aria-hidden="true"></span> 计组训练舱</div>
    <div class="status"><i></i> Immersive video online</div>
  </header>

  <section class="hero">
    <div class="kicker">Computer Organization</div>
    <h1>计算机组成原理<span>题库训练舱</span></h1>
    <p class="summary">把总线、存储器、指令系统、CPU 与控制单元沉入一段低光电路影像，进入后开始填空练习、随机抽题和即时核对答案。</p>
    <div class="actions">
      <a class="enter" id="enterBtn" href="./计组填空题库.html" aria-label="进入计算机组成原理填空题库">
        进入题库答题
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="m13 6 6 6-6 6"></path>
        </svg>
      </a>
      <div class="meta" aria-label="题库信息">
        <span>43 道填空题</span>
        <span>156 道选择题</span>
        <span>随机抽题</span>
      </div>
    </div>
  </section>

  <section class="dock" aria-label="复习模块">
    <div class="module"><b>BUS</b><span>系统总线、仲裁与通信方式</span></div>
    <div class="module"><b>MEMORY</b><span>Cache、DRAM 刷新与替换算法</span></div>
    <div class="module"><b>CPU</b><span>指令周期、取指与执行控制</span></div>
    <div class="module"><b>CONTROL</b><span>微指令、微程序与控制单元</span></div>
  </section>
</main>

<script>
const root = document.documentElement;
const heroVideo = document.getElementById("heroVideo");
const trailCanvas = document.getElementById("dragTrail");
const trailCtx = trailCanvas.getContext("2d");
const fallback = document.getElementById("fallback");
const enterBtn = document.getElementById("enterBtn");
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

let trailDpr = 1;
let isDragging = false;
let trailPoints = [];
let sparks = [];
let ripples = [];
let lastTrailPoint = null;
let dragHead = null;
let pointerX = 0;
let pointerY = 0;
let targetX = 0;
let targetY = 0;
let trailFrame = 0;
let parallaxFrame = 0;

function syncMotionPreference() {
  document.body.classList.toggle("motion-reduced", reduceMotion.matches);
  if (reduceMotion.matches) {
    heroVideo.pause();
    trailCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  } else {
    heroVideo.play().catch(showVideoFallback);
    if (!trailFrame) trailFrame = requestAnimationFrame(drawTrail);
    if (!parallaxFrame) parallaxFrame = requestAnimationFrame(updateParallax);
  }
}

function showVideoFallback() {
  fallback.style.display = "block";
  window.setTimeout(() => {
    fallback.style.display = "none";
  }, 5200);
}

function resizeTrail() {
  trailDpr = Math.min(window.devicePixelRatio || 1, 2);
  trailCanvas.width = Math.floor(window.innerWidth * trailDpr);
  trailCanvas.height = Math.floor(window.innerHeight * trailDpr);
  trailCanvas.style.width = window.innerWidth + "px";
  trailCanvas.style.height = window.innerHeight + "px";
  trailCtx.setTransform(trailDpr, 0, 0, trailDpr, 0, 0);
  trailCtx.imageSmoothingEnabled = true;
}

function addTrailPoint(x, y, pressure = 1, strength = 0.34) {
  if (reduceMotion.matches) return;
  const now = performance.now();
  let velocity = 0;
  if (lastTrailPoint) {
    const dx = x - lastTrailPoint.x;
    const dy = y - lastTrailPoint.y;
    velocity = Math.hypot(dx, dy);
    if (velocity < 1.8) return;
  }
  const point = { x, y, t: now, pressure, velocity, strength };
  trailPoints.push(point);
  if (trailPoints.length > 96) trailPoints.shift();
  lastTrailPoint = point;
  dragHead = { x, y, t: now };

  const burst = Math.max(1, Math.min(9, Math.floor(1 + velocity * 0.08 + strength * 5)));
  for (let i = 0; i < burst; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.35 + Math.random() * 1.65 + Math.min(1.2, velocity * 0.018);
    sparks.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.3,
      life: 360 + Math.random() * 360,
      t: now,
      r: 0.8 + Math.random() * 1.8,
      hue: Math.random(),
      kind: i % 5 === 0 ? "dash" : "dot",
      strength
    });
  }
}

function addRipple(x, y) {
  if (reduceMotion.matches) return;
  ripples.push({ x, y, t: performance.now(), life: 620, spin: Math.random() * Math.PI });
}

function drawTrail() {
  trailFrame = 0;
  if (reduceMotion.matches) return;

  const now = performance.now();
  trailCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  trailCtx.save();
  trailCtx.globalCompositeOperation = "lighter";

  trailPoints = trailPoints.filter(p => now - p.t < 760);
  if (trailPoints.length > 1) {
    for (let i = 1; i < trailPoints.length; i++) {
      const a = trailPoints[i - 1];
      const b = trailPoints[i];
      const age = now - b.t;
      const alpha = Math.max(0, 1 - age / 760);
      const strength = b.strength || 0.34;
      const speedBoost = Math.min(0.85, (b.velocity || 0) / 70);
      const grad = trailCtx.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, `rgba(255, 122, 184, ${alpha * strength * 0.34})`);
      grad.addColorStop(0.48, `rgba(255, 255, 255, ${alpha * strength * 0.38})`);
      grad.addColorStop(1, `rgba(114, 231, 255, ${alpha * strength * 0.42})`);
      trailCtx.strokeStyle = grad;
      trailCtx.lineWidth = 3.8 + alpha * (7.2 + strength * 5.5) + speedBoost * 3.2;
      trailCtx.lineCap = "round";
      trailCtx.lineJoin = "round";
      trailCtx.shadowColor = "rgba(255,122,184,0.5)";
      trailCtx.shadowBlur = 20 * alpha * strength;
      trailCtx.beginPath();
      trailCtx.moveTo(a.x, a.y);
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      trailCtx.quadraticCurveTo(a.x, a.y, mx, my);
      trailCtx.stroke();

      trailCtx.strokeStyle = `rgba(3, 11, 17, ${alpha * 0.24})`;
      trailCtx.lineWidth = 2.8 + alpha * 3.4;
      trailCtx.shadowBlur = 0;
      trailCtx.beginPath();
      trailCtx.moveTo(a.x, a.y);
      trailCtx.quadraticCurveTo(a.x, a.y, mx, my);
      trailCtx.stroke();

      trailCtx.strokeStyle = `rgba(114, 231, 255, ${alpha * strength * 0.24})`;
      trailCtx.lineWidth = 1.1 + speedBoost;
      trailCtx.shadowColor = "rgba(114,231,255,0.42)";
      trailCtx.shadowBlur = 8 * alpha * strength;
      trailCtx.beginPath();
      trailCtx.moveTo(a.x + 6, a.y - 4);
      trailCtx.lineTo(b.x + 6, b.y - 4);
      trailCtx.stroke();
    }

    const head = trailPoints[trailPoints.length - 1];
    const headAge = now - head.t;
    const headAlpha = Math.max(0, 1 - headAge / 520);
    const headStrength = head.strength || 0.34;
    const haloRadius = 38 + headStrength * 34;
    const halo = trailCtx.createRadialGradient(head.x, head.y, 0, head.x, head.y, haloRadius);
    halo.addColorStop(0, `rgba(255,255,255,${headAlpha * headStrength * 0.36})`);
    halo.addColorStop(0.22, `rgba(255,122,184,${headAlpha * headStrength * 0.22})`);
    halo.addColorStop(0.58, `rgba(114,231,255,${headAlpha * headStrength * 0.08})`);
    halo.addColorStop(1, "rgba(255,122,184,0)");
    trailCtx.fillStyle = halo;
    trailCtx.beginPath();
    trailCtx.arc(head.x, head.y, haloRadius, 0, Math.PI * 2);
    trailCtx.fill();
  }

  if (dragHead && now - dragHead.t < 160) {
    const p = Math.max(0, 1 - (now - dragHead.t) / 160);
    trailCtx.strokeStyle = `rgba(255,255,255,${p * 0.22})`;
    trailCtx.lineWidth = 1;
    trailCtx.shadowColor = "rgba(255,122,184,0.36)";
    trailCtx.shadowBlur = 9 * p;
    trailCtx.beginPath();
    trailCtx.arc(dragHead.x, dragHead.y, 5 + 8 * (1 - p), 0, Math.PI * 2);
    trailCtx.stroke();
  }

  sparks = sparks.filter(s => now - s.t < s.life);
  sparks.forEach(s => {
    const age = now - s.t;
    const alpha = Math.max(0, 1 - age / s.life);
    const strength = s.strength || 0.34;
    s.x += s.vx;
    s.y += s.vy;
    s.vx *= 0.976;
    s.vy = s.vy * 0.976 + 0.018;
    const cyan = s.hue > 0.6;
    trailCtx.fillStyle = cyan ? `rgba(114,231,255,${alpha * strength * 0.5})` : `rgba(255,122,184,${alpha * strength * 0.5})`;
    trailCtx.strokeStyle = trailCtx.fillStyle;
    trailCtx.shadowColor = cyan ? "rgba(114,231,255,0.4)" : "rgba(255,122,184,0.42)";
    trailCtx.shadowBlur = 7 * alpha * strength;
    if (s.kind === "dash") {
      trailCtx.lineWidth = Math.max(0.7, s.r * alpha * 0.5);
      trailCtx.beginPath();
      trailCtx.moveTo(s.x, s.y);
      trailCtx.lineTo(s.x - s.vx * 2.6, s.y - s.vy * 2.6);
      trailCtx.stroke();
    } else {
      trailCtx.beginPath();
      trailCtx.arc(s.x, s.y, s.r * alpha * 0.78, 0, Math.PI * 2);
      trailCtx.fill();
    }
  });

  ripples = ripples.filter(r => now - r.t < r.life);
  ripples.forEach(r => {
    const age = now - r.t;
    const p = age / r.life;
    trailCtx.strokeStyle = `rgba(255, 122, 184, ${(1 - p) * 0.22})`;
    trailCtx.lineWidth = 1.2;
    trailCtx.shadowColor = "rgba(255,122,184,0.28)";
    trailCtx.shadowBlur = 10 * (1 - p);
    trailCtx.beginPath();
    trailCtx.arc(r.x, r.y, 10 + p * 58, 0, Math.PI * 2);
    trailCtx.stroke();
    trailCtx.save();
    trailCtx.translate(r.x, r.y);
    trailCtx.rotate(r.spin + p * 1.6);
    trailCtx.setLineDash([9, 9]);
    trailCtx.strokeStyle = `rgba(114, 231, 255, ${(1 - p) * 0.13})`;
    trailCtx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI * 2 * i) / 6;
      const rr = 18 + p * 68;
      const x = Math.cos(angle) * rr;
      const y = Math.sin(angle) * rr;
      if (i === 0) trailCtx.moveTo(x, y);
      else trailCtx.lineTo(x, y);
    }
    trailCtx.closePath();
    trailCtx.stroke();
    trailCtx.restore();
  });

  trailCtx.restore();
  trailFrame = requestAnimationFrame(drawTrail);
}

function updateParallax() {
  parallaxFrame = 0;
  if (reduceMotion.matches) return;
  pointerX += (targetX - pointerX) * 0.075;
  pointerY += (targetY - pointerY) * 0.075;
  root.style.setProperty("--px", pointerX.toFixed(4));
  root.style.setProperty("--py", pointerY.toFixed(4));
  parallaxFrame = requestAnimationFrame(updateParallax);
}

function pointerMove(event) {
  targetX = (event.clientX / window.innerWidth) * 2 - 1;
  targetY = (event.clientY / window.innerHeight) * 2 - 1;
  if ((event.buttons & 1) && !isDragging) pointerDown(event);
  const strength = isDragging ? 0.52 : 0.28;
  addTrailPoint(event.clientX, event.clientY, event.pressure || 1, strength);
}

function pointerDown(event) {
  isDragging = true;
  document.body.classList.add("is-dragging");
  lastTrailPoint = null;
  dragHead = { x: event.clientX, y: event.clientY, t: performance.now() };
  addRipple(event.clientX, event.clientY);
  addTrailPoint(event.clientX, event.clientY, event.pressure || 1, 0.52);
}

function pointerUp() {
  if (dragHead) addRipple(dragHead.x, dragHead.y);
  isDragging = false;
  document.body.classList.remove("is-dragging");
  lastTrailPoint = null;
}

function buttonGlow(event) {
  const rect = enterBtn.getBoundingClientRect();
  enterBtn.style.setProperty("--mx", `${((event.clientX - rect.left) / rect.width) * 100}%`);
  enterBtn.style.setProperty("--my", `${((event.clientY - rect.top) / rect.height) * 100}%`);
}

function resize() {
  resizeTrail();
}

heroVideo.addEventListener("canplay", () => {
  document.body.classList.add("video-ready");
});
heroVideo.addEventListener("error", showVideoFallback);
heroVideo.addEventListener("stalled", showVideoFallback);

window.addEventListener("resize", resize);
window.addEventListener("pointermove", pointerMove);
window.addEventListener("pointerdown", pointerDown);
window.addEventListener("pointerup", pointerUp);
window.addEventListener("pointercancel", pointerUp);
if (!("PointerEvent" in window)) {
  window.addEventListener("mousemove", pointerMove);
  window.addEventListener("mousedown", pointerDown);
  window.addEventListener("mouseup", pointerUp);
}
enterBtn.addEventListener("pointermove", buttonGlow);
window.addEventListener("keydown", event => {
  if (event.key === "Enter") window.location.href = "./计组填空题库.html";
});

if (typeof reduceMotion.addEventListener === "function") {
  reduceMotion.addEventListener("change", syncMotionPreference);
} else {
  reduceMotion.addListener(syncMotionPreference);
}

resize();
syncMotionPreference();
</script>
</body>
</html>

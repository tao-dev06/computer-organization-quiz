<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算机组成原理 · 题库训练舱</title>
<style>
:root {
  color-scheme: dark;
  --bg: #05060d;
  --panel: rgba(248, 249, 255, 0.96);
  --panel-soft: rgba(11, 13, 28, 0.72);
  --panel-glass: rgba(9, 11, 24, 0.58);
  --line: rgba(226, 232, 255, 0.16);
  --line-strong: rgba(255, 122, 184, 0.42);
  --text: #151829;
  --muted: #677087;
  --faint: #98a2b7;
  --blue: #596dff;
  --blue-soft: #eef1ff;
  --cyan: #72e7ff;
  --sakura: #ff7ab8;
  --sakura-soft: #fff0f7;
  --violet: #b7a3ff;
  --teal: #0f8f88;
  --teal-soft: #e6fbf9;
  --amber: #d4699b;
  --green: #177a48;
  --green-soft: #e9f9f0;
  --red: #bf3152;
  --red-soft: #fff0f4;
  --shadow: 0 28px 80px rgba(0, 0, 0, 0.36);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(320px, 400px) minmax(0, 1fr);
  background:
    radial-gradient(circle at 78% 18%, rgba(255, 122, 184, 0.18), transparent 28%),
    radial-gradient(circle at 22% 85%, rgba(114, 231, 255, 0.13), transparent 30%),
    var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}
body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
}
body::before {
  z-index: 0;
  background:
    linear-gradient(90deg, rgba(5, 6, 13, 0.92), rgba(5, 6, 13, 0.64) 43%, rgba(5, 6, 13, 0.82)),
    url("./assets/hero-poster.jpg") center / cover no-repeat;
  filter: saturate(1.12) contrast(1.08) brightness(0.66);
}
body::after {
  z-index: 1;
  opacity: .18;
  mix-blend-mode: screen;
  background:
    linear-gradient(110deg, rgba(255,255,255,0.08), transparent 34%, rgba(255,122,184,0.04)),
    repeating-linear-gradient(180deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 7px);
}
button, input, textarea { font: inherit; }
button { cursor: pointer; }
button:focus-visible,
a:focus-visible,
input:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 3px;
}
.sidebar {
  position: relative;
  z-index: 2;
  min-width: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.055), transparent),
    var(--panel-soft);
  border-right: 1px solid var(--line);
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  height: 100vh;
  box-shadow: 18px 0 70px rgba(0,0,0,.28);
  backdrop-filter: blur(24px);
}
.mobile-dock { display: none; }
.mobile-dock-main { min-width: 0; display: grid; gap: 3px; }
.mobile-dock-main strong { color: #f7f8fc; font-size: 14px; line-height: 1.2; }
.mobile-dock-main span { color: rgba(239,242,252,.66); font-size: 12px; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mobile-dock-main small { color: rgba(239,242,252,.44); font-size: 11px; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mobile-toggle {
  min-height: 38px;
  padding: 0 13px;
  border: 1px solid rgba(255,255,255,.56);
  border-radius: 8px;
  background: linear-gradient(135deg, #fff5fb, var(--sakura) 48%, var(--cyan));
  color: #061018;
  font-size: 13px;
  font-weight: 900;
  box-shadow: 0 12px 28px rgba(255,122,184,.18);
}
.sidebar-head { padding: 20px 20px 13px; border-bottom: 1px solid var(--line); }
.title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
h1 { margin: 0; color: #f7f8fc; font-size: 18px; line-height: 1.3; letter-spacing: 0; text-shadow: 0 0 24px rgba(255,122,184,.2); }
.home-link { color: rgba(239,242,252,.68); text-decoration: none; font-size: 13px; padding: 7px 9px; border: 1px solid transparent; border-radius: 6px; }
.home-link:hover { color: #fff; border-color: rgba(255,122,184,.24); background: rgba(255,122,184,.08); }
.subline { margin-top: 7px; color: rgba(239,242,252,.62); font-size: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.mode-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--line); }
.mode-tab {
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,.045);
  color: rgba(239,242,252,.7);
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .16s ease, border-color .16s ease, background .16s ease;
}
.mode-tab:hover { transform: translateY(-1px); border-color: rgba(255,122,184,.34); background: rgba(255,122,184,.075); }
.mode-tab small { font-weight: 600; color: rgba(239,242,252,.48); }
.mode-tab.active { color: #061018; background: linear-gradient(135deg, #fff5fb, var(--sakura) 48%, var(--cyan)); border-color: rgba(255,255,255,.56); box-shadow: 0 12px 34px rgba(255,122,184,.22); }
.mode-tab.active small { color: rgba(6,16,24,0.72); }
.search-wrap { padding: 10px 20px; position: relative; }
.search-wrap input {
  width: 100%;
  height: 38px;
  padding: 0 12px 0 34px;
  border: 1px solid var(--line);
  border-radius: 8px;
  outline: none;
  background: rgba(255,255,255,.075);
  color: #f7f8fc;
  font-size: 13px;
}
.search-wrap input::placeholder { color: rgba(239,242,252,.42); }
.search-wrap input:focus { border-color: rgba(114,231,255,.72); box-shadow: 0 0 0 3px rgba(114,231,255,.14); background: rgba(255,255,255,.1); }
.search-wrap svg { position: absolute; left: 31px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: rgba(239,242,252,.48); pointer-events: none; }
.nav-list { overflow: auto; padding: 6px 0 10px; }
.nav-list::-webkit-scrollbar { width: 6px; }
.nav-list::-webkit-scrollbar-thumb { background: rgba(255,122,184,.35); border-radius: 999px; }
.chapter { margin: 2px 0; }
.chapter-title {
  min-height: 34px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 20px;
  color: rgba(247,248,252,.88);
  font-size: 13px;
  font-weight: 800;
  user-select: none;
}
.chapter-title .count { margin-left: auto; color: rgba(239,242,252,.46); font-size: 11px; font-weight: 700; }
.chapter-arrow { color: rgba(255,122,184,.74); transition: transform .16s ease; width: 12px; }
.chapter.collapsed .chapter-arrow { transform: rotate(-90deg); }
.chapter.collapsed .question-list { display: none; }
.q-row {
  width: 100%;
  border: 0;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: start;
  gap: 8px;
  min-height: 42px;
  padding: 8px 20px 8px 34px;
  border-left: 3px solid transparent;
  color: rgba(239,242,252,.62);
  background: transparent;
  font-size: 12.5px;
  line-height: 1.45;
  text-align: left;
}
.q-row:hover { background: rgba(255,255,255,.06); color: #fff; }
.q-row.active { background: linear-gradient(90deg, rgba(255,122,184,.18), rgba(114,231,255,.08)); border-left-color: var(--sakura); color: #fff; }
.q-row.done { color: rgba(239,242,252,.78); }
.q-row.correct { background: rgba(23, 122, 72, .14); }
.q-row.wrong { background: rgba(191, 49, 82, .14); }
.q-id {
  min-width: 36px;
  text-align: center;
  padding: 2px 6px;
  border-radius: 6px;
  background: rgba(255,255,255,.1);
  color: rgba(239,242,252,.68);
  font-size: 11px;
  font-weight: 800;
}
.q-row.active .q-id { background: var(--sakura); color: #190611; }
.q-status { font-size: 12px; font-weight: 900; }
.q-status.fill { color: var(--cyan); }
.q-status.correct { color: #72e6a4; }
.q-status.wrong { color: #ff8aa8; }
.empty { padding: 38px 20px; color: rgba(239,242,252,.46); text-align: center; font-size: 13px; }
.sidebar-foot {
  min-height: 52px;
  border-top: 1px solid var(--line);
  padding: 10px 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  color: rgba(239,242,252,.62);
  font-size: 12px;
}
.sidebar-foot strong { color: var(--cyan); }
.main { position: relative; z-index: 2; min-width: 0; height: 100vh; overflow: auto; padding: clamp(18px, 3vw, 40px); display: flex; align-items: center; justify-content: center; }
.main::before {
  content: "BUS / CACHE / CPU / CONTROL";
  position: fixed;
  right: clamp(18px, 3vw, 40px);
  top: clamp(16px, 2.4vw, 32px);
  color: rgba(239,242,252,.24);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .16em;
  pointer-events: none;
}
.quiz-card { width: min(860px, 100%); background: var(--panel); border: 1px solid rgba(255,255,255,.68); border-radius: 8px; box-shadow: var(--shadow), 0 0 0 1px rgba(255,122,184,.08); overflow: hidden; }
.quiz-head {
  min-height: 66px;
  padding: 14px 24px;
  border-bottom: 1px solid rgba(18,24,44,.1);
  background:
    linear-gradient(90deg, rgba(255,122,184,.13), rgba(114,231,255,.1)),
    linear-gradient(180deg, #fff, #f7f8ff);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.tagline { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.bank-tag { color: #c23778; font-size: 12px; font-weight: 900; }
.chapter-tag { color: var(--muted); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
.stat { min-height: 30px; display: inline-flex; align-items: center; gap: 4px; padding: 0 10px; border: 1px solid rgba(18,24,44,.1); border-radius: 8px; color: var(--muted); background: rgba(255,255,255,.74); font-size: 12px; }
.stat b { color: var(--text); font-size: 15px; }
.quiz-body { padding: 26px 28px 22px; }
.qnum { margin: 0 0 14px; font-size: 28px; line-height: 1.2; letter-spacing: 0; }
.qnum span { color: #c23778; }
.stem { font-size: 16px; line-height: 1.9; color: var(--text); word-break: break-word; }
.blank-line { display: inline-block; min-width: 64px; border-bottom: 2px solid var(--amber); margin: 0 5px; color: var(--amber); font-weight: 800; vertical-align: baseline; box-shadow: 0 6px 14px rgba(255,122,184,.1); }
.answer-box { margin-top: 22px; }
.answer-box label { display: block; color: var(--muted); font-size: 12px; font-weight: 900; margin-bottom: 8px; }
.answer-box textarea { width: 100%; min-height: 86px; resize: vertical; border: 1px solid rgba(18,24,44,.12); border-radius: 8px; outline: none; padding: 12px 14px; color: var(--text); background: #fbfcff; line-height: 1.6; }
.answer-box textarea:focus { border-color: #d8609b; box-shadow: 0 0 0 3px rgba(255,122,184,.16); background: #fff; }
.ref-box, .result-box { margin-top: 18px; padding: 15px 16px; border-radius: 8px; display: none; line-height: 1.65; }
.ref-box.show, .result-box.show { display: block; }
.ref-box { background: linear-gradient(135deg, var(--sakura-soft), #eefcff); border: 1px solid #f3b7d4; }
.result-box.correct { background: var(--green-soft); border: 1px solid #bde9ca; }
.result-box.wrong { background: var(--red-soft); border: 1px solid #f0b9c8; }
.box-label { font-size: 12px; font-weight: 900; margin-bottom: 6px; }
.ref-box .box-label { color: #c23778; }
.answer-list { margin: 0; padding-left: 22px; }
.answer-list li { margin: 3px 0; }
.answer-single { font-weight: 700; }
.result-box.correct .box-label { color: var(--green); }
.result-box.wrong .box-label { color: var(--red); }
.choice-options { display: grid; gap: 10px; margin-top: 22px; }
.option {
  width: 100%;
  min-height: 52px;
  display: grid;
  grid-template-columns: 34px minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  text-align: left;
  border: 1px solid rgba(18,24,44,.1);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  padding: 10px 13px;
  transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
}
.option:not(:disabled):hover { transform: translateY(-1px); border-color: var(--line-strong); box-shadow: 0 12px 28px rgba(255,122,184,.1); background: #fffafd; }
.option.selected { border-color: #d8609b; background: var(--sakura-soft); }
.option.correct { border-color: #8dd3a2; background: var(--green-soft); }
.option.wrong { border-color: #ed9fb5; background: var(--red-soft); }
.option-key { width: 30px; height: 30px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; background: #eef2f7; color: var(--muted); font-weight: 900; }
.option.selected .option-key { background: var(--sakura); color: #190611; }
.option.correct .option-key { background: var(--green); color: #fff; }
.option.wrong .option-key { background: var(--red); color: #fff; }
.quiz-foot { padding: 0 28px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.btn {
  min-height: 40px;
  border-radius: 8px;
  border: 1px solid transparent;
  padding: 0 15px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 800;
  color: var(--text);
  background: #fff;
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
}
.btn:disabled { opacity: .55; cursor: not-allowed; }
.btn:not(:disabled):hover { transform: translateY(-1px); }
.btn-primary { background: linear-gradient(135deg, #fff5fb, var(--sakura) 48%, var(--cyan)); color: #061018; border-color: rgba(255,255,255,.7); box-shadow: 0 12px 26px rgba(255,122,184,.2); }
.btn-primary:not(:disabled):hover { box-shadow: 0 16px 34px rgba(255,122,184,.26); }
.btn-secondary { color: #bd3476; border-color: #f0b5d0; background: #fff; }
.btn-secondary:not(:disabled):hover { background: var(--sakura-soft); }
.btn-plain { color: var(--muted); border-color: var(--line); background: #fff; }
.btn-plain:not(:disabled):hover { color: var(--text); background: #f6f8fb; }
.kbd-hint { margin-right: auto; color: var(--faint); font-size: 12px; }
kbd { font-family: var(--font); border: 1px solid var(--line); background: #f8fafc; border-radius: 5px; padding: 1px 6px; color: var(--muted); }
.start-overlay { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(5, 6, 13, .68); backdrop-filter: blur(18px); }
.start-panel { width: min(760px, 100%); background: rgba(248,249,255,.96); border: 1px solid rgba(255,255,255,.62); border-radius: 8px; box-shadow: var(--shadow); padding: 24px; }
.start-panel h2 { margin: 0; font-size: 24px; }
.start-panel p { margin: 8px 0 20px; color: var(--muted); line-height: 1.7; }
.start-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.start-card { position: relative; overflow: hidden; border: 1px solid rgba(18,24,44,.1); border-radius: 8px; background: linear-gradient(145deg, #fff, #fff6fb 62%, #eefcff); color: var(--text); min-height: 142px; padding: 18px; text-align: left; display: grid; align-content: space-between; transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease; }
.start-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(255,122,184,.12), transparent 45%, rgba(114,231,255,.1)); opacity: .8; pointer-events: none; }
.start-card:hover { transform: translateY(-2px); border-color: #e36aa4; box-shadow: 0 16px 34px rgba(255,122,184,.16); }
.start-card h3, .start-card span { position: relative; z-index: 1; }
.start-card h3 { margin: 0; color: var(--text); font-size: 20px; }
.start-card span { color: var(--muted); font-size: 13px; line-height: 1.65; }
.start-card b { color: #c23778; }
@media (max-width: 900px) {
  body {
    height: 100svh;
    min-height: 100svh;
    grid-template-columns: 1fr;
    grid-template-rows: auto minmax(0, 1fr);
    overflow: hidden;
  }
  .sidebar {
    height: auto;
    min-height: 0;
    max-height: min(82svh, 720px);
    grid-template-rows: auto auto auto auto minmax(0, 1fr) auto;
    overflow: hidden;
    border-right: 0;
    border-bottom: 1px solid var(--line);
    box-shadow: 0 24px 70px rgba(0,0,0,.42);
    transition: max-height .22s ease, box-shadow .22s ease;
  }
  .mobile-dock {
    min-height: 72px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(90deg, rgba(255,122,184,.1), rgba(114,231,255,.055));
  }
  .nav-list {
    min-height: 0;
    max-height: none;
    overscroll-behavior: contain;
  }
  .main {
    height: auto;
    min-height: 0;
    overflow: auto;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 12px;
  }
  .main::before { display: none; }
  .quiz-card { margin: 0 auto 16px; }
  .quiz-head { align-items: flex-start; flex-direction: column; }
  .stats { justify-content: flex-start; }
  body.nav-collapsed .sidebar {
    max-height: 72px;
    box-shadow: 0 12px 42px rgba(0,0,0,.24);
  }
  body.nav-collapsed .sidebar-head,
  body.nav-collapsed .mode-tabs,
  body.nav-collapsed .search-wrap,
  body.nav-collapsed .nav-list,
  body.nav-collapsed .sidebar-foot {
    display: none;
  }
}
@media (max-width: 620px) {
  body { grid-template-rows: auto minmax(0, 1fr); }
  .sidebar { max-height: 86svh; }
  .mobile-dock { padding-left: 12px; padding-right: 12px; }
  .mobile-toggle { padding: 0 11px; }
  .sidebar-head, .mode-tabs, .search-wrap, .sidebar-foot { padding-left: 14px; padding-right: 14px; }
  .q-row { padding-left: 22px; padding-right: 14px; }
  .chapter-title { padding-left: 14px; padding-right: 14px; }
  .main { padding: 8px 6px 12px; }
  .quiz-head { padding: 12px 18px; gap: 10px; }
  .quiz-body { padding: 20px 18px 16px; }
  .quiz-foot { padding: 0 18px 18px; }
  .qnum { font-size: 24px; }
  .stem { line-height: 1.75; }
  .start-grid { grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: .01ms !important;
  }
}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="mobile-dock">
    <div class="mobile-dock-main">
      <strong id="mobileMode">填空题</strong>
      <span id="mobileSummary">0/43 已查看答案</span>
      <small id="mobileChapter">第一章 计算机系统概论</small>
    </div>
    <button class="mobile-toggle" id="btnToggleNav" type="button" aria-expanded="false" aria-controls="navList">展开题库</button>
  </div>
  <div class="sidebar-head">
    <div class="title-row">
      <h1>计算机组成原理题库</h1>
      <a class="home-link" href="./index.html">返回主页</a>
    </div>
    <div class="subline" id="subline"></div>
  </div>
  <div class="mode-tabs" aria-label="题型切换">
    <button class="mode-tab" id="tabFill" type="button" data-mode="fill"><b>填空题</b><small id="fillCount"></small></button>
    <button class="mode-tab" id="tabChoice" type="button" data-mode="choice"><b>选择题</b><small id="choiceCount"></small></button>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
    <input id="searchInput" type="search" placeholder="搜索题干或答案">
  </div>
  <nav class="nav-list" id="navList"></nav>
  <div class="sidebar-foot" id="sidebarFoot"></div>
</aside>
<main class="main">
  <section class="quiz-card" aria-live="polite">
    <div class="quiz-head">
      <div class="tagline">
        <div class="bank-tag" id="bankTag"></div>
        <div class="chapter-tag" id="chapterTag"></div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="quiz-body" id="quizBody"></div>
    <div class="quiz-foot" id="quizFoot"></div>
  </section>
</main>
<div class="start-overlay" id="startOverlay">
  <div class="start-panel">
    <h2>选择题型</h2>
    <p>填空题保留查看答案进度，选择题保留作答、正确和错误记录。</p>
    <div class="start-grid">
      <button class="start-card" type="button" data-start="fill">
        <h3>填空题</h3>

const STORE_KEY = "co_quiz_system_v2";

let state = loadState();

  mobileChapter: document.getElementById("mobileChapter"),

  fillCount: document.getElementById("fillCount"),
  choiceCount: document.getElementById("choiceCount"),
  tabFill: document.getElementById("tabFill"),
  tabChoice: document.getElementById("tabChoice"),

  sidebarFoot: document.getElementById("sidebarFoot"),
  bankTag: document.getElementById("bankTag"),
  chapterTag: document.getElementById("chapterTag"),

  quizBody: document.getElementById("quizBody"),
  quizFoot: document.getElementById("quizFoot"),
  startOverlay: document.getElementById("startOverlay")
};

function loadState() {
  try {
    const parsed = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
    return mergeState(DEFAULT_STATE, parsed || {});
  } catch (_) {
    return structuredClone(DEFAULT_STATE);
  }
}
function loadNavCollapsed() {
  try {
    const saved = localStorage.getItem(NAV_COLLAPSED_KEY);
    return saved == null ? true : saved !== "false";
  } catch (_) {
    return true;
  }
}
function mergeState(base, extra) {
  const out = structuredClone(base);
  if (!extra || typeof extra !== "object") return out;
  if (extra.mode === "fill" || extra.mode === "choice") out.mode = extra.mode;
  if (extra.fill) {
    out.fill.currentId = extra.fill.currentId || null;
    out.fill.revealed = Array.isArray(extra.fill.revealed) ? extra.fill.revealed : [];
    out.fill.notes = extra.fill.notes && typeof extra.fill.notes === "object" ? extra.fill.notes : {};
  }
  if (extra.choice) {
    out.choice.currentId = extra.choice.currentId || null;
    out.choice.answered = extra.choice.answered && typeof extra.choice.answered === "object" ? extra.choice.answered : {};
    out.choice.selected = extra.choice.selected && typeof extra.choice.selected === "object" ? extra.choice.selected : {};
  }
  return out;
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function saveNavCollapsed() {
  try {
    localStorage.setItem(NAV_COLLAPSED_KEY, navCollapsed ? "true" : "false");
  } catch (_) {}
}
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s == null ? "" : String(s);
  return d.innerHTML;
}
function bank() { return BANKS[currentMode]; }
function getCurrentQuestion() { return bank().find(q => q.id === currentId) || bank()[0]; }
function isMobileNav() { return mobileNavQuery.matches; }
function setNavCollapsed(collapsed, persist = true) {
  navCollapsed = collapsed;
  document.body.classList.toggle("nav-collapsed", collapsed);
  els.btnToggleNav.setAttribute("aria-expanded", collapsed ? "false" : "true");
  els.btnToggleNav.textContent = collapsed ? "展开题库" : "收起题库";
  if (persist) saveNavCollapsed();
  renderMobileDock();
}
function collapseNavOnMobile() {
  if (isMobileNav()) setNavCollapsed(true);
}
function renderMobileDock() {
  const q = getCurrentQuestion();
  const modeText = currentMode === "fill" ? "填空题" : "选择题";
  els.mobileMode.textContent = `${modeText} · 第 ${q.number} 题`;
  els.mobileChapter.textContent = q.chapter;
  if (currentMode === "fill") {
    const revealed = state.fill.revealed.length;
    els.mobileSummary.textContent = `${revealed}/${BANKS.fill.length} 已查看答案`;
  } else {
    const answered = Object.values(state.choice.answered);
    const correct = answered.filter(x => x.correct).length;
    els.mobileSummary.textContent = `${answered.length}/${BANKS.choice.length} 已答 · 正确 ${correct}`;
  }
}
function setMode(mode, showFirstAvailable = false) {
  currentMode = mode;
  state.mode = mode;
  const savedId = state[mode].currentId;
  currentId = (!showFirstAvailable && savedId && BANKS[mode].some(q => q.id === savedId)) ? savedId : BANKS[mode][0].id;
  state[mode].currentId = currentId;
  els.searchInput.value = "";
  searchText = "";
  saveState();
  renderAll();
  collapseNavOnMobile();
}
function setQuestion(id) {
  if (!bank().some(q => q.id === id)) return;
  currentId = id;
  state[currentMode].currentId = id;
  saveState();
  renderAll(false);
  collapseNavOnMobile();
}
function nextQuestion() {
  const list = bank();
  const idx = list.findIndex(q => q.id === currentId);
  setQuestion(list[(idx + 1 + list.length) % list.length].id);
}
function randomQuestion() {
  const list = bank();
  if (list.length <= 1) return setQuestion(list[0].id);
  let next = currentId;
  while (next === currentId) next = list[Math.floor(Math.random() * list.length)].id;
  setQuestion(next);
}
function groupByChapter(items) {
  return items.reduce((acc, q) => {
    if (!acc[q.chapter]) acc[q.chapter] = [];
    acc[q.chapter].push(q);
    return acc;
  }, {});
}
function matches(q, term) {
  if (!term) return true;
  const hay = currentMode === "fill"
    ? `${q.stem} ${q.answer} ${q.chapter}`
    : `${q.stem} ${q.answer} ${q.answerText} ${q.explanation} ${q.options.map(o => o.text).join(" ")} ${q.chapter}`;
  return hay.toLowerCase().includes(term.toLowerCase());
}
function summarizeStem(q) {
  const s = q.stem.replace(/_____/g, "□").replace(/\s+/g, " ");
  return s.length > 44 ? s.slice(0, 44) + "..." : s;
}
function renderAll(scrollActive = true) {
  els.fillCount.textContent = `${BANKS.fill.length}题`;
  els.choiceCount.textContent = `${BANKS.choice.length}题`;
  els.tabFill.classList.toggle("active", currentMode === "fill");
  els.tabChoice.classList.toggle("active", currentMode === "choice");
  renderNav(scrollActive);
  renderQuiz();
  renderStats();
  renderMobileDock();
}
function renderNav(scrollActive = true) {
  const grouped = groupByChapter(bank());
  const term = searchText.trim();
  let html = "";
  for (const [chapter, qs] of Object.entries(grouped)) {
    const visible = qs.filter(q => matches(q, term));
    if (!visible.length) continue;
    html += `<section class="chapter"><div class="chapter-title" data-toggle><span class="chapter-arrow">▾</span><span>${esc(chapter)}</span><span class="count">${visible.length}/${qs.length}</span></div><div class="question-list">`;
    visible.forEach(q => {
      const active = q.id === currentId ? " active" : "";
      let rowClass = "";
      let status = "";
      if (currentMode === "fill" && state.fill.revealed.includes(q.id)) { rowClass = " done"; status = `<span class="q-status fill">已看</span>`; }
      if (currentMode === "choice" && state.choice.answered[q.id]) {
        const ok = state.choice.answered[q.id].correct;
        rowClass = ok ? " correct" : " wrong";
        status = `<span class="q-status ${ok ? "correct" : "wrong"}">${ok ? "正确" : "错题"}</span>`;
      }
      html += `<button class="q-row${active}${rowClass}" type="button" data-id="${q.id}"><span class="q-id">${q.number}</span><span>${esc(summarizeStem(q))}</span>${status}</button>`;
    });
    html += `</div></section>`;
  }
  els.navList.innerHTML = html || `<div class="empty">没有匹配的题目</div>`;
  els.navList.querySelectorAll(".q-row").forEach(btn => btn.addEventListener("click", () => setQuestion(btn.dataset.id)));
  els.navList.querySelectorAll("[data-toggle]").forEach(title => title.addEventListener("click", () => title.closest(".chapter").classList.toggle("collapsed")));
  if (scrollActive) els.navList.querySelector(".q-row.active")?.scrollIntoView({ block: "nearest" });
}
function renderStats() {
  if (currentMode === "fill") {
    const revealed = state.fill.revealed.length;
    els.subline.innerHTML = `<span>填空题库</span><span>${revealed}/${BANKS.fill.length} 已查看答案</span>`;
    els.stats.innerHTML = `<span class="stat">已看 <b>${revealed}</b></span><span class="stat">剩余 <b>${BANKS.fill.length - revealed}</b></span>`;
    els.sidebarFoot.innerHTML = `<span>共 <strong>${BANKS.fill.length}</strong> 题</span><span>已看 <strong>${revealed}</strong> 题</span>`;
  } else {
    const answered = Object.values(state.choice.answered);
    const correct = answered.filter(x => x.correct).length;
    const wrong = answered.length - correct;
    els.subline.innerHTML = `<span>选择题库</span><span>${answered.length}/${BANKS.choice.length} 已作答</span>`;
    els.stats.innerHTML = `<span class="stat">已答 <b>${answered.length}</b></span><span class="stat">正确 <b>${correct}</b></span><span class="stat">错误 <b>${wrong}</b></span>`;
    els.sidebarFoot.innerHTML = `<span>共 <strong>${BANKS.choice.length}</strong> 题</span><span>正确 <strong>${correct}</strong></span><span>错误 <strong>${wrong}</strong></span>`;

function renderQuiz() {
  const q = getCurrentQuestion();

function retryChoice(id) {
  delete state.choice.answered[id];
  delete state.choice.selected[id];
  saveState();
  renderAll(false);
}
function bindCommonButtons(kind) {
  document.getElementById("btnNext").addEventListener("click", nextQuestion);
  document.getElementById("btnRandom").addEventListener("click", randomQuestion);
  document.getElementById("btnReset").addEventListener("click", () => resetProgress(kind));
}
function resetProgress(kind) {
  if (kind === "fill") {
    state.fill.revealed = [];
    state.fill.notes = {};
  } else {
    state.choice.answered = {};
    state.choice.selected = {};
  }
  saveState();
  renderAll(false);
}

els.tabFill.addEventListener("click", () => setMode("fill"));
els.tabChoice.addEventListener("click", () => setMode("choice"));
els.btnToggleNav.addEventListener("click", () => setNavCollapsed(!navCollapsed));
els.searchInput.addEventListener("input", e => { searchText = e.target.value; renderNav(false); });
els.startOverlay.querySelectorAll("[data-start]").forEach(btn => btn.addEventListener("click", () => {
  els.startOverlay.style.display = "none";
  setMode(btn.dataset.start);
}));
document.addEventListener("keydown", event => {
  const tag = document.activeElement?.tagName;
  if (tag === "TEXTAREA" || tag === "INPUT") return;
  if (event.key === "ArrowRight") { event.preventDefault(); nextQuestion(); }
  if (event.key === " " && currentMode === "fill") { event.preventDefault(); revealFill(currentId); }
  if (event.key === "Enter" && currentMode === "choice") { event.preventDefault(); submitChoice(currentId); }
});

if (!state.fill.currentId) state.fill.currentId = BANKS.fill[0].id;
if (!state.choice.currentId) state.choice.currentId = BANKS.choice[0].id;
currentId = state[currentMode].currentId;
if (typeof mobileNavQuery.addEventListener === "function") {
  mobileNavQuery.addEventListener("change", () => setNavCollapsed(navCollapsed, false));
} else {
  mobileNavQuery.addListener(() => setNavCollapsed(navCollapsed, false));
}
setNavCollapsed(navCollapsed, false);
renderAll();
</script>
</body>
</html>
